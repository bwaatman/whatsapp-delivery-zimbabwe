<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f5576c;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vendor Registration</h1>
        <p class="subtitle">Register your shop and start selling on our platform</p>
        
        <form id="registrationForm">
            <div class="form-group">
                <label for="businessName">Business Name</label>
                <input type="text" id="businessName" name="businessName" required placeholder="Enter your business name">
            </div>

            <div class="form-group">
                <label for="businessPhone">Business Phone</label>
                <input type="tel" id="businessPhone" name="businessPhone" required placeholder="Enter your business phone number">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password" minlength="6">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password" minlength="6">
            </div>

            <div class="form-group">
                <label for="businessEmail">Business Email</label>
                <input type="email" id="businessEmail" name="businessEmail" required placeholder="Enter your business email">
            </div>

            <div class="form-group">
                <label for="businessAddress">Business Address</label>
                <textarea id="businessAddress" name="businessAddress" required placeholder="Enter your business address"></textarea>
            </div>

            <div class="form-group">
                <label for="businessLicenseNumber">Business License Number</label>
                <input type="text" id="businessLicenseNumber" name="businessLicenseNumber" required placeholder="Enter your business license number">
            </div>

            <div class="form-group">
                <label for="taxId">Tax ID</label>
                <input type="text" id="taxId" name="taxId" required placeholder="Enter your tax ID">
            </div>

            <div class="form-group">
                <label for="businessDescription">Business Description</label>
                <textarea id="businessDescription" name="businessDescription" required placeholder="Describe your business"></textarea>
            </div>

            <div class="form-group">
                <label for="shopAddress">Shop Address</label>
                <textarea id="shopAddress" name="shopAddress" required placeholder="Enter your shop address"></textarea>
            </div>

            <button type="submit" id="submitBtn">Register</button>
        </form>

        <div id="message" class="message"></div>

        <div class="login-link">
            Already registered? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            const formData = {
                business_name: document.getElementById('businessName').value,
                business_phone: document.getElementById('businessPhone').value,
                password: document.getElementById('password').value,
                business_email: document.getElementById('businessEmail').value,
                business_address: document.getElementById('businessAddress').value,
                business_license_number: document.getElementById('businessLicenseNumber').value,
                tax_id: document.getElementById('taxId').value,
                business_description: document.getElementById('businessDescription').value,
                shop_address: document.getElementById('shopAddress').value
            };

            // Validate password
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Passwords do not match';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
                return;
            }

            if (password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Password must be at least 6 characters';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/shops/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Registration submitted successfully! Your application is pending approval.';
                    messageDiv.style.display = 'block';
                    document.getElementById('registrationForm').reset();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'Registration failed. Please try again.';
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Network error. Please check your connection and try again.';
                messageDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
